name: Test

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust
    runs-on: self-hosted
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        shell: bash
        run: |
          set -euxo pipefail
          if ! command -v rustup >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
              | sh -s -- -y --profile minimal --default-toolchain stable
          fi
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.cargo/bin:$PATH"
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup component add rustfmt

      - name: Show toolchain
        run: |
          rustc --version
          cargo --version

      - name: Install GTK4 and libadwaita dev headers
        shell: bash
        run: |
          if command -v apt-get >/dev/null 2>&1; then
            sudo apt-get install -y --no-install-recommends \
              libgtk-4-dev libadwaita-1-dev pkg-config
          elif command -v dnf >/dev/null 2>&1; then
            sudo dnf install -y gtk4-devel libadwaita-devel pkgconf
          elif command -v pacman >/dev/null 2>&1; then
            sudo pacman -S --noconfirm gtk4 libadwaita pkgconf
          else
            echo "Unknown distro; skipping GTK4 headers"
          fi

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Build workspace
        run: cargo build --workspace --locked

      - name: Test workspace
        run: cargo test --workspace --locked

      - name: Test CLI session smoke
        run: cargo test -p linux-conductor --test cli_sessions --locked
