name: Test

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            cargo_scope: "--workspace"
            label: "full workspace"
          - os: ubuntu-22.04
            cargo_scope: "--workspace --exclude linux-conductor-gtk"
            label: "core and CLI"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install GTK4 and libadwaita dev headers
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libgtk-4-dev libadwaita-1-dev pkg-config \
            git sqlite3 openssh-client

      - name: Show toolchain
        run: |
          rustc --version
          cargo --version
          echo "Scope: ${{ matrix.label }}"

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Build ${{ matrix.label }}
        run: cargo build ${{ matrix.cargo_scope }} --locked

      - name: Test ${{ matrix.label }}
        run: cargo test ${{ matrix.cargo_scope }} --locked
