name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-release:
    name: Build release binary
    runs-on: self-hosted
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          rustc --version
          cargo --version

      - name: Build
        run: cargo build --workspace --release --locked

      - name: Package CLI artifact
        run: |
          mkdir -p dist
          tar -czf dist/linux-conductor-${{ github.ref_name }}-${{ runner.os }}-${{ runner.arch }}.tar.gz \
            -C target/release linux-conductor

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-conductor-${{ github.ref_name }}-${{ runner.os }}-${{ runner.arch }}
          path: dist/*.tar.gz

      - name: Attach artifact to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
